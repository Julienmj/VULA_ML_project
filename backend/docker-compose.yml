version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: crop_disease_db
    environment:
      POSTGRES_USER: pacifique
      POSTGRES_PASSWORD: Euqificap12.
      POSTGRES_DB: crop_disease_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: crop_disease_redis
    command: redis-server --requirepass Euqificap12.
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: crop_disease_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://pacifique:Euqificap12.@postgres:5432/crop_disease_db
      - REDIS_URL=redis://:Euqificap12.@redis:6379
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
